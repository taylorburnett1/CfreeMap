elevate", "D2D", "2025-04-21 00:00:00"], ["Duane coffey", "10216 Willowemac Ct Orlando, FL 32817", "(407) 509-6692", "Orlando", "Colby Free", "Elevate - Orlando East 2026", "", null, null, "elevate", "D2D", "2025-04-19 00:00:00"], ["Shunta nafeild", "2266 Merry Rd Tavares, FL 32778", "(352) 267-9629", "Tavares", "Colby Free", "Elevate - Orlando East 2026", "", null, null, "elevate", "D2D", "2025-04-19 00:00:00"], ["Ken cohen", "2243 Merry Rd Tavares, FL 32778", "(352) 455-2134", "Tavares", "Colby Free", "Elevate - Orlando East 2026", "", null, null, "elevate", "D2D", "2025-04-19 00:00:00"]];
const MAPTILER_KEY = "x4DzVUPS1vUHPz21B4gY";
const STORAGE_KEY = 'cfree_v3_coords';

const SETTER_COLORS = {"Scott Robinson": "#1565C0", "Connor Free": "#2E7D32", "Brandon Charles": "#C62828", "Alfredo Preciado": "#6A1B9A", "Drew Donner": "#E65100", "Jerard Smith": "#00695C", "Blake Shirah": "#F9A825", "Colby Free": "#AD1457", "Lily Tingley": "#0277BD", "Kameron Brooks": "#4E342E", "Joseph Reed": "#558B2F", "Jakob Worley": "#283593", "Revington Dearing": "#6D4C41", "Myles Clarkson": "#00838F", "Kevin Strickland": "#D84315", "Jonathon Crow": "#7B1FA2", "Sarah Sessions": "#C0CA33", "Jacob Hatch": "#00ACC1", "Thomas Vogt": "#EF6C00", "Caleb Vinci": "#5E35B1", "Danielle Bovee": "#D81B60", "Joel Rodriguez": "#1B5E20", "Taylor Burnett": "#37474F", "Kota": "#F5C800", "": "#888888"};
function setterColor(s){ return SETTER_COLORS[s] || '#555'; }

let leads = RAW.map(r => ({
  name: r[0], address: r[1], phone: r[2], city: r[3],
  setter: r[4], office: r[5], status: r[6],
  lat: r[7], lng: r[8], source: r[9],
  lead_source: r[10]||'', added: r[11]||'',
}));

function makePinSVG(color, letter){
  return `<path d="M11 0C5 0 0 5 0 11c0 7.5 11 19 11 19s11-11.5 11-19C22 5 17 0 11 0z" fill="${color}" stroke="rgba(255,255,255,0.7)" stroke-width="1.5"/>
    <text x="11" y="13" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle" dominant-baseline="middle">${letter}</text>`;
}

// Map engine
let Z=9, cx=-81.4, cy=28.7;
const TILE=256;
const wrap=document.getElementById('map-wrap');
const tilesEl=document.getElementById('tiles');
const pinEl=document.getElementById('pinlayer');

function setHdrH(){ document.documentElement.style.setProperty('--hdr-h', document.getElementById('hdr').offsetHeight+'px'); }
function lon2x(lon,z){ return ((lon+180)/360)*Math.pow(2,z); }
function lat2y(lat,z){ const s=Math.sin(lat*Math.PI/180); return (0.5-Math.log((1+s)/(1-s))/(4*Math.PI))*Math.pow(2,z); }
function ll2px(lat,lon){
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  return [W/2+(lon2x(lon,Z)-lon2x(cx,Z))*TILE, H/2+(lat2y(lat,Z)-lat2y(cy,Z))*TILE];
}

function loadTiles(){
  tilesEl.innerHTML='';
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  const oxf=lon2x(cx,Z), oyf=lat2y(cy,Z), ox=oxf*TILE, oy=oyf*TILE;
  const x0=Math.floor(oxf-W/2/TILE), x1=Math.ceil(oxf+W/2/TILE);
  const y0=Math.floor(oyf-H/2/TILE), y1=Math.ceil(oyf+H/2/TILE);
  const max=Math.pow(2,Z)-1, subs=['a','b','c'];
  for(let tx=x0;tx<=x1;tx++) for(let ty=y0;ty<=y1;ty++){
    if(ty<0||ty>max) continue;
    const img=document.createElement('img');
    const ntx=((tx%Math.pow(2,Z))+Math.pow(2,Z))%Math.pow(2,Z);
    img.src=`https://${subs[(ntx+ty)%3]}.tile.openstreetmap.org/${Z}/${ntx}/${ty}.png`;
    img.style.cssText=`position:absolute;left:${tx*TILE-ox+W/2}px;top:${ty*TILE-oy+H/2}px;width:256px;height:256px;`;
    img.onerror=()=>{ img.style.display='none'; };
    tilesEl.appendChild(img);
  }
}

// Populate filters
const setters=[...new Set(leads.map(l=>l.setter).filter(Boolean))].sort();
const cities=[...new Set(leads.map(l=>l.city).filter(c=>c&&c.trim()))].sort();
setters.forEach(s=>{ const o=document.createElement('option');o.value=s;o.textContent=s;document.getElementById('fSetter').appendChild(o); });
cities.forEach(c=>{ const o=document.createElement('option');o.value=c;o.textContent=c;document.getElementById('fCity').appendChild(o); });

// Legend
const legEl=document.getElementById('leg-items');
setters.forEach(s=>{
  const c=setterColor(s);
  legEl.innerHTML+=`<div class="lr"><div class="ld" style="background:${c}"></div><span>${s}</span></div>`;
});

function getFiltered(){
  const s=document.getElementById('srch').value.toLowerCase();
  const st=document.getElementById('fSetter').value;
  const c=document.getElementById('fCity').value;
  const ss=document.getElementById('fStatus').value;
  return leads.filter(l=>
    (!s||l.name.toLowerCase().includes(s)||l.address.toLowerCase().includes(s)||(l.setter||'').toLowerCase().includes(s))
    &&(!st||l.setter===st)
    &&(!c||l.city===c)
    &&(!ss||l.status===ss)
  );
}

function renderPins(){
  pinEl.innerHTML='';
  const filtered=getFiltered();
  const W=wrap.offsetWidth, H=wrap.offsetHeight;
  let shown=0;
  filtered.forEach(lead=>{
    if(!lead.lat||!lead.lng) return;
    const [px,py]=ll2px(lead.lat,lead.lng);
    if(px<-30||py<-30||px>W+30||py>H+30) return;
    shown++;
    const color=setterColor(lead.setter);
    const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
    svg.setAttribute('width','44'); svg.setAttribute('height','52');
    svg.setAttribute('viewBox','-11 -11 44 52'); svg.setAttribute('class','pin');
    svg.style.cssText=`position:absolute;left:${px-22}px;top:${py-41}px;`;
    svg.innerHTML=`<rect x="-11" y="-11" width="44" height="52" fill="transparent"/>` + makePinSVG(color, (lead.name||'?')[0].toUpperCase());
    svg.addEventListener('click',e=>{e.stopPropagation();openSheet(lead);});
    svg.addEventListener('touchend',e=>{e.preventDefault();e.stopPropagation();openSheet(lead);});
    pinEl.appendChild(svg);
  });
  const total=leads.length, done=leads.filter(l=>l.lat).length;
  document.getElementById('stats').textContent = done<total
    ? `Geocoding ${done}/${total}...`
    : `${shown} of ${filtered.length} pins`;
  renderList(filtered);
}

function renderList(filtered){
  document.getElementById('list-count').textContent=`${filtered.length} leads`;
  document.getElementById('list-body').innerHTML=filtered.map(l=>`
    <div class="list-item" onclick="focusLead(${leads.indexOf(l)})">
      <div class="li-dot" style="background:${setterColor(l.setter)}"></div>
      <div class="li-info">
        <div class="li-name">${l.name}${!l.lat?' ⏳':''}</div>
        <div class="li-sub">${l.address}</div>
        <div class="li-setter" style="color:${setterColor(l.setter)}">${l.setter||'Unassigned'}</div>
      </div>
    </div>`).join('');
}

function focusLead(idx){
  const lead=leads[idx];
  if(lead&&lead.lat){ cx=lead.lng; cy=lead.lat; Z=16; loadTiles(); renderPins(); }
  if(lead) openSheet(lead);
  if(listOpen) toggleList();
}

function openSheet(lead){
  const isIOS=/iPad|iPhone|iPod/.test(navigator.userAgent);
  // Use the address field directly - it already has full address
  const mapsUrl=isIOS
    ?'https://maps.apple.com/?daddr='+encodeURIComponent(lead.address)
    :'https://www.google.com/maps/dir/?api=1&destination='+encodeURIComponent(lead.address);
  const sc=lead.status==='Confirmed'||lead.status==='Sold - Active'?'b-confirmed':lead.status==='Proposal Only'?'b-proposal':'b-other';
  const sc2=lead.status||'No status';
  const scolor=setterColor(lead.setter);
  const addedStr=lead.added?lead.added.split(' ')[0]:'';
  document.getElementById('sheet-body').innerHTML=`
    <div class="s-name">${lead.name}</div>
    <a class="s-addr" href="${mapsUrl}" target="_blank">
      <span class="s-addr-icon">&#128205;</span>
      <span class="s-addr-text">${lead.address}<br><span class="s-hint">Tap for directions &#8594;</span></span>
    </a>
    <div class="s-divider"></div>
    ${lead.phone?`<div class="s-row"><span class="s-icon">&#128222;</span><div><div class="s-label">Phone</div><a href="tel:${lead.phone}" style="color:#185FA5;text-decoration:none;font-size:13px;font-weight:500;">${lead.phone}</a></div></div>`:''}
    ${lead.city?`<div class="s-row"><span class="s-icon">&#127968;</span><div><div class="s-label">City</div><div class="s-val">${lead.city}</div></div></div>`:''}
    ${lead.office?`<div class="s-row"><span class="s-icon">&#127970;</span><div><div class="s-label">Office</div><div class="s-val">${lead.office}</div></div></div>`:''}
    ${lead.lead_source?`<div class="s-row"><span class="s-icon">&#128196;</span><div><div class="s-label">Lead Source</div><div class="s-val">${lead.lead_source}</div></div></div>`:''}
    ${addedStr?`<div class="s-row"><span class="s-icon">&#128197;</span><div><div class="s-label">Added</div><div class="s-val">${addedStr}</div></div></div>`:''}
    <div class="s-divider"></div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-top:4px;">
      <span class="s-badge ${sc}">${sc2}</span>
      ${lead.source==='cfree'?`<span class="s-badge b-kota">Kota Lead</span>`:''}
      ${lead.setter?`<span class="s-setter-badge" style="background:${scolor}"><span class="s-setter-dot"></span>${lead.setter}</span>`:''}
    </div>
  `;
  document.getElementById('sheet').classList.add('open');
}
function closeSheet(){ document.getElementById('sheet').classList.remove('open'); }
wrap.addEventListener('click',e=>{ if(e.target===wrap||e.target.tagName==='IMG'){ closeSheet(); document.getElementById('legend').classList.remove('open'); } });

// Geocoding via MapTiler
function loadCache(){
  try {
    const saved=localStorage.getItem(STORAGE_KEY);
    if(saved){
      const cache=JSON.parse(saved);
      leads.forEach(l=>{ if(cache[l.address]){ l.lat=cache[l.address][0]; l.lng=cache[l.address][1]; } });
    }
  } catch(e){}
}
function saveCache(){
  try {
    const cache={};
    leads.forEach(l=>{ if(l.lat) cache[l.address]=[l.lat,l.lng]; });
    localStorage.setItem(STORAGE_KEY,JSON.stringify(cache));
  } catch(e){}
}

async function geocodeAll(){
  const pending=leads.filter(l=>!l.lat);
  if(pending.length===0){
    document.getElementById('progress-wrap').style.display='none';
    document.getElementById('geocode-msg').classList.remove('show');
    renderPins(); return;
  }
  const msg=document.getElementById('geocode-msg');
  msg.classList.add('show');
  const total=leads.length;
  for(let i=0;i<pending.length;i++){
    const lead=pending[i];
    const done=total-pending.length+i;
    msg.textContent=`&#128205; Locating ${done+1}/${total}: ${lead.name}...`;
    document.getElementById('progress-fill').style.width=((done/total)*100).toFixed(0)+'%';
    try {
      const q=encodeURIComponent(lead.address);
      const res=await fetch(`https://api.maptiler.com/geocoding/${q}.json?key=${MAPTILER_KEY}&limit=1&country=us`);
      const data=await res.json();
      if(data.features&&data.features.length>0){
        const [lng,lat]=data.features[0].geometry.coordinates;
        lead.lat=lat; lead.lng=lng;
        saveCache();
        if(i%10===0) renderPins();
      }
    } catch(e){ console.warn('Geocode failed:', lead.address, e); }
    await new Promise(r=>setTimeout(r,80));
  }
  document.getElementById('progress-fill').style.width='100%';
  msg.textContent=`✅ All ${total} addresses located!`;
  setTimeout(()=>{ msg.classList.remove('show'); document.getElementById('progress-wrap').style.display='none'; },2500);
  renderPins();
}

// Touch & mouse
let panStart=null,panCx=null,panCy=null,touches={},lastDist=null;
wrap.addEventListener('touchstart',e=>{
  Array.from(e.changedTouches).forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});
  if(e.touches.length===1){panStart={x:e.touches[0].clientX,y:e.touches[0].clientY};panCx=cx;panCy=cy;}
  if(e.touches.length===2){const ids=Object.keys(touches);const a=touches[ids[0]],b=touches[ids[1]];lastDist=Math.hypot(b.x-a.x,b.y-a.y);panStart=null;}
},{passive:true});
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>{touches[t.identifier]={x:t.clientX,y:t.clientY};});
  if(e.touches.length===1&&panStart){
    const dx=e.touches[0].clientX-panStart.x,dy=e.touches[0].clientY-panStart.y;
    const tc=Math.pow(2,Z);cx=panCx-dx/TILE/tc*360;
    const ny=lat2y(panCy,Z)-dy/TILE;cy=Math.atan(Math.sinh(Math.PI*(1-2*ny/tc)))*180/Math.PI;
    loadTiles();renderPins();
  } else if(e.touches.length===2){
    const ids=Object.keys(touches);
    if(ids.length>=2){
      const a=touches[ids[0]],b=touches[ids[1]],dist=Math.hypot(b.x-a.x,b.y-a.y);
      if(lastDist){Z=Math.max(6,Math.min(18,Z+Math.log2(dist/lastDist)));}
      lastDist=dist;loadTiles();renderPins();
    }
  }
},{passive:false});
wrap.addEventListener('touchend',e=>{
  Array.from(e.changedTouches).forEach(t=>{delete touches[t.identifier];});
  lastDist=null;
  if(e.touches.length===1){panStart={x:e.touches[0].clientX,y:e.touches[0].clientY};panCx=cx;panCy=cy;}
},{passive:true});
let drag=false,dragX=0,dragY=0,dragCx=0,dragCy=0;
wrap.addEventListener('mousedown',e=>{drag=true;dragX=e.clientX;dragY=e.clientY;dragCx=cx;dragCy=cy;wrap.classList.add('dragging');});
document.addEventListener('mouseup',()=>{drag=false;wrap.classList.remove('dragging');});
document.addEventListener('mousemove',e=>{
  if(!drag)return;
  const dx=e.clientX-dragX,dy=e.clientY-dragY;
  const tc=Math.pow(2,Z);cx=dragCx-dx/TILE/tc*360;
  const ny=lat2y(dragCy,Z)-dy/TILE;cy=Math.atan(Math.sinh(Math.PI*(1-2*ny/tc)))*180/Math.PI;
  loadTiles();renderPins();
});
wrap.addEventListener('wheel',e=>{e.preventDefault();zoom(e.deltaY<0?1:-1);},{passive:false});
function zoom(d){Z=Math.max(6,Math.min(18,Z+d));loadTiles();renderPins();}

let listOpen=false;
function toggleList(){
  listOpen=!listOpen;
  document.getElementById('list-panel').classList.toggle('open',listOpen);
  document.getElementById('list-toggle').innerHTML=listOpen?'&#10005; Close':'&#9776; List';
}

window.addEventListener('resize',()=>{setHdrH();loadTiles();renderPins();});
window.addEventListener('orientationchange',()=>{setTimeout(()=>{setHdrH();loadTiles();renderPins();},300);});

setHdrH(); loadCache(); loadTiles(); renderPins();
setTimeout(geocodeAll, 500);
</script>
